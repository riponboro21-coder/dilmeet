<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DilMeet Premium</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}
body{
background:#090909;
color:white;
padding:15px;
}
.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}
.logo{
font-size:34px;
font-weight:bold;
background:linear-gradient(90deg,#ff3cac,#784ba0,#2b86c5);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.icons button{
background:#111;
border:none;
color:white;
padding:12px;
margin-left:8px;
border-radius:12px;
font-size:18px;
}
.tabs,.chips{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:15px;
}
.tabs button,.chips button{
border:none;
padding:12px 18px;
border-radius:20px;
background:#141414;
color:#bbb;
white-space:nowrap;
}
.active{
background:linear-gradient(90deg,#ff3cac,#784ba0,#2b86c5)!important;
color:white!important;
}
.card{
background:#111;
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
.card img{
width:100%;
height:430px;
object-fit:cover;
}
.info{
padding:18px;
}
.match{
display:inline-block;
background:#000;
padding:8px 14px;
border-radius:20px;
font-weight:bold;
color:#ffd54f;
margin-bottom:10px;
}
.voice{
display:inline-block;
padding:8px 14px;
border:1px solid #444;
border-radius:20px;
margin-left:10px;
}
.name{
font-size:32px;
font-weight:bold;
margin-top:10px;
}
.city{
color:#ccc;
margin-top:8px;
}
.bio{
margin-top:10px;
color:#ddd;
line-height:1.5;
}
.tags{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:15px;
}
.tags span{
background:#222;
padding:8px 12px;
border-radius:14px;
font-size:14px;
}
.actions{
display:flex;
justify-content:space-around;
margin-top:20px;
padding-bottom:20px;
}
.actions button{
width:60px;
height:60px;
border:none;
border-radius:50%;
font-size:22px;
background:#1a1a1a;
color:white;
}
.like{
background:#ff2d75!important;
}
.super{
background:#2b86c5!important;
}
</style>
</head>
<body>

<div class="top">
<div class="logo">💘 Dil Meet</div>
<div class="icons">
<button>☀️</button>
<button>👤</button>
</div>
</div>

<div class="tabs">
<button class="active">🔍 Discover</button>
<button>💕 Matches</button>
<button>📍 Nearby</button>
</div>

<div class="chips">
<button class="active">✨ All</button>
<button>🎉 Fun</button>
<button>💼 Serious</button>
<button>🤝 Friendship</button>
<button>😊 Casual</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=800&q=80">

<div class="info">
<div>
<span class="match">🤖 91% Match</span>
<span class="voice">🎙 Voice Intro</span>
</div>

<div class="name">Riya Kapoor, 23</div>
<div class="city">📍 Bangalore</div>

<div class="bio">
Engineer 💻 | Weekend hiker 🏔 | Coffee lover ☕
</div>

<div class="tags">
<span>#Tech</span>
<span>#Gaming</span>
<span>#Coffee</span>
<span>#Movies</span>
</div>

<div class="actions">
<button>❌</button>
<button>⭐</button>
<button class="like" onclick="alert('🎉 Match Found! ₹1 Unlock Chat')">❤️</button>
<button class="super">⚡</button>
</div>

</div>
</div>

</body>
</html>
