<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DilMeet</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff4da6,#7c3aed);
color:white;
text-align:center;
padding:30px;
}
.card{
background:white;
color:black;
max-width:360px;
margin:auto;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
.photo{
height:260px;
background:#ddd;
border-radius:15px;
margin-bottom:15px;
}
button{
padding:12px 18px;
border:none;
border-radius:12px;
margin:6px;
font-size:16px;
cursor:pointer;
}
.like{background:#ff2d75;color:#fff;}
.skip{background:#eee;color:#111;}
</style>
</head>
<body>

<h1>💖 DilMeet</h1>
<p>Find Real Matches</p>

<div class="card">
<div class="photo"></div>
<h2>Aarohi, 24</h2>
<p>Music • Travel • Coffee</p>

<button class="skip">Skip</button>
<button class="like" onclick="alert('🎉 Match Found! Unlock Chat ₹1')">Like ❤️</button>
</div>

</body>
</html>
